{{- if .Values.timescaledb.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wosa.timescaledb.name" . }}
  namespace: {{ include "wosa.namespace" . }}
  labels:
    {{- include "wosa.labels" . | nindent 4 }}
    app.kubernetes.io/component: timescaledb
spec:
  replicas: {{ .Values.timescaledb.replicas }}
  selector:
    matchLabels:
      {{- include "wosa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: timescaledb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "wosa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: timescaledb
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "wosa.serviceAccountName" . }}
      {{- include "wosa.imagePullSecrets" . | nindent 6 }}
      {{- include "wosa.podSecurityContext" . | nindent 6 }}
      containers:
        - name: timescaledb
          image: "{{ .Values.timescaledb.image.repository }}:{{ .Values.timescaledb.image.tag }}"
          imagePullPolicy: {{ .Values.timescaledb.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: {{ .Values.timescaledb.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.timescaledb.resources | nindent 12 }}
          {{- include "wosa.containerSecurityContext" . | nindent 10 }}
          livenessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "wosa.secret.name" . }}
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wosa.secret.name" . }}
                  key: postgres-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "wosa.secret.name" . }}
                  key: postgres-db
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
        {{- if .Values.monitoring.enabled }}
        - name: postgres-exporter
          image: "{{ .Values.monitoring.exporters.postgres.image.repository }}:{{ .Values.monitoring.exporters.postgres.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9187
              protocol: TCP
          env:
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "wosa.secret.name" . }}
                  key: postgres-user
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "wosa.secret.name" . }}
                  key: postgres-password
            - name: DATA_SOURCE_URI
              value: "localhost:{{ .Values.timescaledb.port }}/{{ .Values.secrets.postgresDb }}?sslmode=disable"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          {{- include "wosa.containerSecurityContext" . | nindent 10 }}
        {{- end }}

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "wosa.timescaledb.name" . }}-data
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "wosa.timescaledb.name" . }}
  namespace: {{ include "wosa.namespace" . }}
  labels:
    {{- include "wosa.labels" . | nindent 4 }}
    app.kubernetes.io/component: timescaledb
spec:
  selector:
    {{- include "wosa.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: timescaledb
  ports:
    - name: postgres
      port: {{ .Values.timescaledb.port }}
      targetPort: postgres
      protocol: TCP
    {{- if .Values.monitoring.enabled }}
    - name: metrics
      port: 9187
      targetPort: metrics
      protocol: TCP
    {{- end }}
{{- end }}
