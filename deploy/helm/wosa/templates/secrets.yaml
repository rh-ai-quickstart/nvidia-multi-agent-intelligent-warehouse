{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wosa.secret.name" . }}
  namespace: {{ include "wosa.namespace" . }}
  labels:
    {{- include "wosa.labels" . | nindent 4 }}
type: Opaque
stringData:
  nvidia-api-key: {{ required "secrets.nvidiaApiKey is required" .Values.secrets.nvidiaApiKey | quote }}
  embedding-api-key: {{ include "wosa.apiKeyOrDefault" (list .Values.secrets.embeddingApiKey .Values.secrets.nvidiaApiKey) | quote }}
  rail-api-key: {{ include "wosa.apiKeyOrDefault" (list .Values.secrets.railApiKey .Values.secrets.nvidiaApiKey) | quote }}
  nemo-retriever-api-key: {{ include "wosa.apiKeyOrDefault" (list .Values.secrets.nemoRetrieverApiKey .Values.secrets.nvidiaApiKey) | quote }}
  nemo-ocr-api-key: {{ include "wosa.apiKeyOrDefault" (list .Values.secrets.nemoOcrApiKey .Values.secrets.nvidiaApiKey) | quote }}
  nemo-parse-api-key: {{ include "wosa.apiKeyOrDefault" (list .Values.secrets.nemoParseApiKey .Values.secrets.nvidiaApiKey) | quote }}
  llama-nano-vl-api-key: {{ include "wosa.apiKeyOrDefault" (list .Values.secrets.llamaNanoVlApiKey .Values.secrets.nvidiaApiKey) | quote }}
  jwt-secret-key: {{ .Values.secrets.jwtSecretKey | quote }}
  postgres-user: {{ .Values.secrets.postgresUser | quote }}
  postgres-password: {{ .Values.secrets.postgresPassword | quote }}
  postgres-db: {{ .Values.secrets.postgresDb | quote }}
  default-user-password: {{ .Values.secrets.defaultUserPassword | quote }}
  minio-access-key: {{ .Values.secrets.minioAccessKey | quote }}
  minio-secret-key: {{ .Values.secrets.minioSecretKey | quote }}
{{- end }}
