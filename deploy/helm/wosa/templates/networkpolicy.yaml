{{- if .Values.networkPolicy.enabled }}
# ---------------------------------------------------------------------------
# Policy 1: Default deny - block all ingress to WOSA pods
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wosa.fullname" . }}-default-deny
  namespace: {{ include "wosa.namespace" . }}
  labels:
    {{- include "wosa.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "wosa.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
{{- if .Values.openshift.enabled }}
---
# ---------------------------------------------------------------------------
# Policy 2: Allow ingress from OpenShift router to nginx
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wosa.fullname" . }}-allow-router
  namespace: {{ include "wosa.namespace" . }}
  labels:
    {{- include "wosa.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "wosa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nginx
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - protocol: TCP
          port: {{ .Values.nginx.service.port }}
{{- end }}
---
# ---------------------------------------------------------------------------
# Policy 3: Allow internal pod-to-pod + DNS + external HTTPS
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wosa.fullname" . }}-allow-internal
  namespace: {{ include "wosa.namespace" . }}
  labels:
    {{- include "wosa.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "wosa.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "wosa.selectorLabels" . | nindent 14 }}
  egress:
    # Allow DNS resolution (CoreDNS)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              {{- include "wosa.selectorLabels" . | nindent 14 }}
    # Allow external HTTPS (port 443) for NVIDIA cloud API calls
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
{{- if .Values.monitoring.enabled }}
---
# ---------------------------------------------------------------------------
# Policy 4: Allow Prometheus scrapes + Grafana -> Thanos Querier
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wosa.fullname" . }}-allow-monitoring
  namespace: {{ include "wosa.namespace" . }}
  labels:
    {{- include "wosa.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "wosa.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Prometheus (openshift-monitoring) to scrape metrics endpoints
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-monitoring
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-user-workload-monitoring
      ports:
        - protocol: TCP
          port: {{ .Values.backend.port }}
        - protocol: TCP
          port: 9187
        - protocol: TCP
          port: 9121
        - protocol: TCP
          port: {{ .Values.milvus.httpPort }}
  egress:
    # Allow Grafana to reach Thanos Querier in openshift-monitoring
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-monitoring
      ports:
        - protocol: TCP
          port: 9091
{{- end }}
{{- end }}
